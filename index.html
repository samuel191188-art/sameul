<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>圈叉遊戲作業</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>圈叉遊戲 (Tic-Tac-Toe)</h1>
    
    <div class="scoreboard">
        <div class="score-box">
            <span class="label">玩家 (O)</span>
            <span id="player-score" class="score">0</span>
        </div>
        <div class="score-box">
            <span class="label">電腦 (X)</span>
            <span id="cpu-score" class="score">0</span>
        </div>
    </div>

    <div id="board" class="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>

    <h2 id="status">輪到你了 (O)</h2>
    <button onclick="reset()">重新開始遊戲</button>

    <script src="script.js"></script>
</body>
</html>
